version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartlesson_frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      LESSON_SERVICE_URL: http://lesson-service:8002
      AI_SERVICE_URL: http://ai-service:8003
    depends_on:
      - auth-service
      - lesson-service
      - ai-service
    volumes:
      - ./storage:/app/storage
      - .:/app
    restart: always

  auth-service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    container_name: smartlesson_auth_service
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/storage/smart_lesson_official_v4.db
    volumes:
      - ./storage:/app/storage
      - .:/app
    restart: always

  lesson-service:
    build:
      context: .
      dockerfile: services/lesson_service/Dockerfile
    container_name: smartlesson_lesson_service
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/storage/smart_lesson_official_v4.db
    volumes:
      - ./storage:/app/storage
      - .:/app
    restart: always

  ai-service:
    build:
      context: .
      dockerfile: services/ai_service/Dockerfile
    container_name: smartlesson_ai_service
    ports:
      - "8003:8003"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: always

